models:
  evolution:
    model_id: ""
    api_base: ""  # Set via CODE2MATH_API_BASE in .env
    api_key: ""   # Set via CODE2MATH_API_KEY in .env
    temperature: 0.7
    max_tokens: 16384
  solvability:
    model_id: ""
    api_base: ""
    api_key: ""
    temperature: 0.0
    max_tokens: 16384
  difficulty:
    model_id: ""
    api_base: ""
    api_key: ""
    temperature: 0.0
    max_tokens: 16384

agents:
  max_steps: 30

pipeline:
  max_rollouts: 20
  workers: 1

sandbox:
  executor_type: "local"
  authorized_imports:
    - sympy
    - numpy
    - scipy
    - itertools
    - collections
    - functools
    - math
    - fractions
    - decimal
    - statistics
    - random
    - networkx
    - z3

data:
  seed_problems: "original_problems.json"
  demonstrations_dir: "prompts/math_demonstrations"
  output_dir: "evolved_problems"

logging:
  level: "INFO"
  log_dir: "logs"
  save_trajectories: false
